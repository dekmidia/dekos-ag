squad: ops
name: "Ops — Operações do CEO"
descricao: "Agentes de produtividade pessoal, criatividade e monitoramento de sistema"
version: "1.1.0"

agents:
  - id: secretaria
    name: Donna
    file: squads/ops/donna.md
    emoji: "🗂️"
    missao: "Priorização diária de tarefas com base em impacto no negócio"

  - id: leo
    name: Leo
    file: squads/ops/leo.md
    emoji: "💡"
    missao: "Captura de ideias e geração criativa de oportunidades"

  - id: sentinel
    name: Sentinel
    file: squads/ops/sentinel.md
    emoji: "🔍"
    missao: "Monitoramento de integridade do sistema DEK-OS — registry, agentes, tasks e skills"

tasks:
  - id: task-priorizar-dia
    agent: donna
    file: squads/ops/tasks/task-priorizar-dia.md
  - id: task-capturar-ideia
    agent: leo
    file: squads/ops/tasks/task-capturar-ideia.md
  - id: task-analisar-ideias
    agent: leo
    file: squads/ops/tasks/task-analisar-ideias.md
  - id: task-health-check
    agent: sentinel
    file: squads/ops/tasks/task-health-check.md
    frequencia_recomendada: "toda segunda-feira + após qualquer merge no Git"

data:
  - squads/ops/data/tempos-medios.json
  - squads/ops/data/activity-log.json

memory:
  - squads/ops/memory/optimizer-memory.json

skills:
  - skills/activity-logger/SKILL.md
  - skills/workflow-optimizer/SKILL.md

output_dirs:
  donna: PROJETOS/_ops/agenda/
  leo: PROJETOS/_ideias/
  sentinel: PROJETOS/_ops/health-checks/
